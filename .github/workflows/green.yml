name: Forward-Only Transparent Contribution Pattern

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: transparent-forward-pattern-main
  cancel-in-progress: false

jobs:
  contribution-pattern:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure transparent bot identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify forward-only state
        run: |
          git fetch origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "Remote main changed. Stopping instead of overwriting history."
            exit 1
          fi

      - name: Generate transparent forward-only commit
        run: |
          python3 << 'PY'
          import hashlib
          import json
          import os
          import random
          import subprocess
          from datetime import date, datetime, timedelta, timezone
          from pathlib import Path

          STATE_PATH = Path(".student-pattern/state.json")
          WORK_FILES = [
              Path("internship-log/daily-notes.md"),
              Path("internship-log/debug-notes.md"),
              Path("internship-log/learning-journal.md"),
              Path("experiment/forward-observations.md"),
          ]
          MESSAGES = [
              "Forward-only transparent experiment update",
              "Record current graph observation",
              "Update internship-pattern note",
              "Refresh educational workflow sample",
          ]

          def run(command):
              subprocess.run(command, shell=False, check=True)

          def rng_for(label):
              key = f"{os.environ.get('GITHUB_REPOSITORY', 'local')}:{label}"
              digest = hashlib.sha256(key.encode("utf-8")).hexdigest()
              return random.Random(int(digest[:16], 16))

          def load_state(today):
              if STATE_PATH.exists():
                  return json.loads(STATE_PATH.read_text(encoding="utf-8"))
              return {
                  "started_on": today.isoformat(),
                  "target_total": 860,
                  "target_active_days": 210,
                  "created_commits": 0,
                  "active_days": 0,
                  "last_active_on": None,
              }

          def save_state(state):
              STATE_PATH.parent.mkdir(parents=True, exist_ok=True)
              STATE_PATH.write_text(json.dumps(state, indent=2) + "\n", encoding="utf-8")

          def gap_today(today):
              for offset in range(5):
                  start = today - timedelta(days=offset)
                  rng = rng_for(f"future-gap:{start.isoformat()}")
                  if rng.random() < 0.025 and start <= today < start + timedelta(days=rng.randint(3, 5)):
                      return True
              return False

          def commit_count(today):
              if gap_today(today):
                  return 0
              rng = rng_for(f"future-count:{today.isoformat()}")
              weekday = today.weekday()
              if weekday == 6:
                  return rng.choice([0, 0, 0, 1])
              if weekday == 5:
                  return rng.choice([0, 0, 1, 1, 2])
              if weekday == 4:
                  return rng.choice([0, 1, 1, 2, 3])
              return rng.choices([1, 2, 3, 4, 5], weights=[25, 30, 25, 15, 5], k=1)[0]

          today = datetime.now(timezone.utc).date()
          state = load_state(today)
          total = commit_count(today)

          if total == 0:
              print(f"Transparent zero-commit day for {today.isoformat()}.")
              raise SystemExit(0)

          state["active_days"] += 1
          state["last_active_on"] = today.isoformat()
          for index in range(total):
              rng = rng_for(f"future-file:{today.isoformat()}:{index}")
              path = rng.choice(WORK_FILES)
              path.parent.mkdir(parents=True, exist_ok=True)
              now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
              if path.suffix == ".md" and not path.exists():
                  path.write_text(f"# {path.stem.replace('-', ' ').title()}\n", encoding="utf-8")
              with path.open("a", encoding="utf-8") as handle:
                  handle.write(f"\n## {now}\n- Transparent forward-only run {index + 1}/{total}\n")
              state["created_commits"] += 1
              save_state(state)
              run(["git", "add", str(path), str(STATE_PATH)])
              diff = subprocess.run(["git", "diff", "--cached", "--quiet"], shell=False)
              if diff.returncode != 0:
                  msg = rng.choice(MESSAGES)
                  run(["git", "commit", "-m", msg])
          PY

      - name: Push commits
        run: |
          git fetch origin main
          if [ "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" ]; then
            echo "No new commits to push."
          else
            git push origin HEAD:main
          fi

      - name: Verify remote sync
        run: |
          git fetch origin main
          if [ "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" ]; then
            echo "SUCCESS: local main matches origin/main."
          else
            echo "ERROR: local main does not match origin/main."
            exit 1
          fi
